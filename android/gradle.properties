# -Djavax.net.ssl.trustStoreType=Windows-ROOT makes Gradle's JVM trust the
# Windows certificate store (same CAs Windows/schannel trust). Required on
# machines with an SSL-inspecting proxy/antivirus whose root CA is installed
# in Windows but missing from the JDK's bundled cacerts — otherwise Maven
# artifact downloads fail with "PKIX path building failed".
org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -Djavax.net.ssl.trustStoreType=Windows-ROOT
org.gradle.java.home=C:\\Users\\azyz2\\scoop\\apps\\temurin17-jdk\\current
android.useAndroidX=true
android.overridePathCheck=true
# Plain console → Gradle logs each task to stdout (visible progress in CI/logs)
org.gradle.console=plain
# Compile Kotlin inside the Gradle daemon (no separate Kotlin daemon socket).
# Required on locked-down machines where firewall/AV blocks the Kotlin daemon's
# localhost socket — otherwise builds hang or fail with
# "Could not connect to Kotlin compile daemon".
kotlin.compiler.execution.strategy=in-process

name: mubtaath
description: "A Saudi student voice-based social platform for students abroad"
publish_to: "none"
version: 1.0.0+8

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ─── State Management ───────────────────────────────────────
  lucide_icons: ^0.257.0
  pinput: ^5.0.0
  flutter_bloc: ^8.1.6 # BLoC pattern — core state management
  bloc: ^8.1.4 # BLoC base package
  equatable: ^2.0.5 # Value equality for BLoC states/events
# المكتبة الصحيحة للقبلة (تعمل على الويب والجوال)
  smooth_compass: ^2.0.17
  geolocator: ^10.1.0   # GPS coordinates
  adhan: ^2.0.0+1        # Islamic prayer-time calculations (pure Dart)
  geocoding: ^3.0.0      # Reverse-geocode coordinates → city/country name
  # ─── Dependency Injection ───────────────────────────────────
  get_it: ^8.0.2 # Service locator — registers repositories & use cases
  injectable: ^2.4.4 # Code-gen annotations for get_it

  # ─── Navigation ─────────────────────────────────────────────
  go_router: ^14.2.7 # Declarative routing with deep-link support

  # ─── Networking & API ────────────────────────────────────────
  dio: ^5.7.0 # HTTP client — ready for REST API integration
  retrofit: ^4.4.1 # Type-safe API calls via code generation

  # ─── Local Storage ──────────────────────────────────────────
  shared_preferences: ^2.3.2 # Key-value storage (tokens, settings)
  flutter_secure_storage: ^9.2.2 # Secure token storage (JWT / refresh tokens)
  hive_flutter: ^1.1.0 # Local NoSQL DB — cache rooms & messages

  # ─── Firebase / Push Notifications (FCM) + Sign-In ──────────
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_auth: ^5.3.1 # Google/Apple sign-in — issues the ID token the backend verifies
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.5 # SHA-256 nonce hashing for Sign in with Apple + Firebase

  # ─── Real-time / Voice ──────────────────────────────────────
  # NOTE: Replace with actual WebRTC / Agora integration in production
  web_socket_channel: ^3.0.1 # WebSocket for real-time chat & room events
  agora_rtc_engine: ^6.3.2    # Real-time audio — voice room feature

  # ─── UI & Design ────────────────────────────────────────────
  google_fonts: ^6.2.1 # Cairo (primary) + Tajawal (secondary)
  flutter_svg: ^2.0.10+1 # SVG assets (icons, illustrations)
  cached_network_image: ^3.4.1 # Avatar & room cover image caching
  shimmer: ^3.0.0 # Loading skeleton screens
  lottie: ^3.1.2 # Animated illustrations (onboarding, empty states)
  flutter_animate: ^4.5.0 # Micro-animations (mic pulse, room transitions)

  # ─── Permissions & Device ───────────────────────────────────
  permission_handler: ^11.3.1 # Microphone, notification permissions
  just_audio: ^0.9.40 # Audio playback

  # ─── Localization (ar / en — RTL/LTR) ──────────────────────────
  intl: ^0.20.2 # Pinned by flutter_localizations SDK; date/number formatting + ARB plurals
  flutter_localizations:
    sdk: flutter # GlobalMaterialLocalizations, GlobalWidgetsLocalizations

  # ─── Utilities ──────────────────────────────────────────────
  dartz: ^0.10.1 # Functional: Either<Failure, Success> pattern
  freezed_annotation: ^2.4.4 # Immutable data classes
  json_annotation: ^4.9.0 # JSON serialization annotations
  connectivity_plus: ^6.1.0 # Network connectivity checks
  uuid: ^4.5.1 # Unique IDs for local entities
  timeago: ^3.7.0 # "2 minutes ago" timestamps
  country_flags: ^2.0.1 # Country flag widgets (student origin display)
  intl_phone_field: ^3.2.0 # Registration phone: dial-code prefix + per-country validation (pure Dart, no native deps)
  url_launcher: ^6.3.0 # Open tel:, WhatsApp (wa.me), and external links
  flutter_html: ^3.0.0 # Render dashboard-authored rich text (Terms/Privacy/About) — pure Dart, no native deps

  # ─── Local (prayer-time) notifications ──────────────────────
  flutter_local_notifications: ^17.2.3 # Scheduled adhan-time notifications
  timezone: ^0.9.4                      # TZDateTime for zoned scheduling
  flutter_timezone: ^3.0.1              # Device local timezone name

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ─── Code Generation ─────────────────────────────────────────
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2 # Generates DI registrations
  retrofit_generator: ^9.1.5 # Generates API client code
  freezed: ^2.4.0 # Use older compatible version
  json_serializable: ^6.8.0 # Generates fromJson/toJson

  # ─── Testing ─────────────────────────────────────────────────
  mocktail: ^1.0.4 # Mocking for unit tests
  very_good_analysis: ^6.0.0 # Strict lint rules

  flutter_lints: ^4.0.0
  pretty_dio_logger: ^1.4.0 # debug-only — logs requests/responses in dev
  flutter_launcher_icons: ^0.14.4 # generates iOS + Android launcher icons (all sizes)

flutter:
  uses-material-design: true
  generate: true  # enables flutter gen-l10n via l10n.yaml
  # agora_rtc_engine's iOS Swift Package Manager manifest doesn't expose every
  # header its CocoaPods build does (AgoraRtcWrapper/AgoraPIPController.h is
  # missing under SPM), breaking iOS archives. Force CocoaPods-only linking.
  config:
    enable-swift-package-manager: false

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/ # Lottie JSON files
    - assets/fonts/
    - assets/avatars/
    - assets/sounds/

  fonts:
    # Cairo — Primary font
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

    # Tajawal — Secondary font
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700

# ── App launcher icons (iOS + Android, all sizes) ───────────────────────────
# Source: logo1.png (opaque brand mark on sage-green). iOS gets a rounded-rect
# icon; Android gets both a legacy icon and an adaptive icon (foreground mark
# over the matching sage-green background). Regenerate with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/images/logo1.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#6E886D"
  min_sdk_android: 21
  adaptive_icon_background: "#6E886D"
  adaptive_icon_foreground: "assets/images/logo1.png"
